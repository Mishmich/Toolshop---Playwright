name: Playwright Tests
on:
  schedule:
    - cron: '0 0 * * 0'  # Run every Sunday at midnight UTC
  workflow_dispatch:
  push:
permissions:
  contents: read
  checks: write
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests - Smoke (push only)
      if: ${{ github.event_name == 'push' }}
      run: npx playwright test --grep '@positive'
      continue-on-error: true
    - name: Run Playwright tests - Full suite (schedule & manual)
      if: ${{ github.event_name != 'push' }}
      run: npx playwright test
      continue-on-error: true
    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action/composite@v2
      if: ${{ !cancelled() }}
      with:
        files: test-results/junit.xml
        check_name: Playwright Test Results
    - name: Upload Playwright Report to GitHub Pages
      if: ${{ !cancelled() }}
      uses: actions/upload-pages-artifact@v3
      with:
        path: playwright-report/
    - name: Deploy to GitHub Pages
      if: ${{ !cancelled() }}
      id: deployment
      uses: actions/deploy-pages@v4