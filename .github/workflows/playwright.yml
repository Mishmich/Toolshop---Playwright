name: Playwright Tests
on:
  schedule:
    - cron: '0 0 * * 0'  # Run every Sunday at midnight UTC
  workflow_dispatch:
  push:
permissions:
  contents: read
  checks: write
  pages: write
  id-token: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      repo_lower: ${{ steps.repo.outputs.lowercase }}
    steps:
    - uses: actions/checkout@v4
    - name: Convert repo name to lowercase
      id: repo
      run: echo "lowercase=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/${{ steps.repo.outputs.lowercase }}:latest
        cache-from: type=registry,ref=ghcr.io/${{ steps.repo.outputs.lowercase }}:buildcache
        cache-to: type=registry,ref=ghcr.io/${{ steps.repo.outputs.lowercase }}:buildcache,mode=max

  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: build
    container:
      image: ghcr.io/${{ needs.build.outputs.repo_lower }}:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - uses: actions/checkout@v4
    - name: Install npm dependencies
      run: npm ci
    - name: Install Playwright browsers
      run: npx playwright install
    - name: Run Playwright tests - Smoke (push only)
      if: ${{ github.event_name == 'push' }}
      run: npx playwright test --grep '@smoke'
      continue-on-error: true
    - name: Run Playwright tests - Full suite (schedule & manual)
      if: ${{ github.event_name != 'push' }}
      run: npx playwright test
      continue-on-error: true
    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action/composite@v2
      if: ${{ !cancelled() }}
      with:
        files: test-results/junit.xml
        check_name: Playwright Test Results
    - name: Upload Playwright Report to GitHub Pages
      if: ${{ !cancelled() }}
      uses: actions/upload-pages-artifact@v3
      with:
        path: playwright-report/
    - name: Deploy to GitHub Pages
      if: ${{ !cancelled() }}
      id: deployment
      uses: actions/deploy-pages@v4